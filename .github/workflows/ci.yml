name: CI Pipeline

on:
  push:
    branches: [ "chore/unit-integration-tests-ci" ]
  pull_request:
    branches: [ "main", "developer" ]

jobs:
  static-analysis:
    name: Static Analysis & Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy
          pip install -r backend/requirements.txt || echo "No requirements.txt found"

      - name: Check code formatting with Black
        run: black --check backend/

      - name: Lint with Flake8
        run: flake8 backend/ --max-line-length=120 --ignore=E203,W503

      - name: Static Type Checking with Mypy
        run: mypy backend/app --strict --ignore-missing-imports

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (SAST)
        run: bandit -r backend/app/ -ll -ii

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend/'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  test:
    name: Pytest Suite
    runs-on: ubuntu-latest
    needs: [static-analysis, security-scan]
    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        working-directory: ./backend
        run: |
          python -m pytest -v --cov=app --cov-report=xml
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage report (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false
