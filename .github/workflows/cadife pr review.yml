name: Cadife Smart Travel — Code Review & Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  should-review:
    name: Verificar se PR necessita revisão
    runs-on: ubuntu-latest
    outputs:
      should-review: ${{ steps.check.outputs.should-review }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Verificar condições de skip
        id: check
        run: |
          # Skip se PR está em draft
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "should-review=false" >> $GITHUB_OUTPUT
            echo "⏭️ Pulando review: PR em draft"
            exit 0
          fi
          
          # Skip se PR foi fechado
          if [[ "${{ github.event.pull_request.state }}" == "closed" ]]; then
            echo "should-review=false" >> $GITHUB_OUTPUT
            echo "⏭️ Pulando review: PR fechado"
            exit 0
          fi
          
          # Skip se já foi comentado pelo Claude
          if gh pr view ${{ github.event.number }} --json comments | grep -q "Auditor Cadife Smart Travel"; then
            echo "should-review=false" >> $GITHUB_OUTPUT
            echo "⏭️ Pulando review: Claude já comentou"
            exit 0
          fi
          
          echo "should-review=true" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit-pr:
    name: Auditar PR contra Spec & Regras Cadife
    needs: should-review
    if: needs.should-review.outputs.should-review == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obter diff do PR
        id: diff
        run: |
          # Extrai o diff completo
          git fetch origin pull/${{ github.event.number }}/head
          DIFF=$(git diff origin/main...FETCH_HEAD)
          
          # Escapa para JSON
          DIFF_ESCAPED=$(echo "$DIFF" | jq -Rs .)
          echo "diff=$DIFF_ESCAPED" >> $GITHUB_OUTPUT
          
          # Obter arquivos modificados
          FILES=$(git diff --name-only origin/main...FETCH_HEAD)
          echo "files=$FILES" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validação Preliminar — Regras Críticas
        id: validate
        run: |
          DIFF="${{ steps.diff.outputs.diff }}"
          FILES="${{ steps.diff.outputs.files }}"
          
          # Array para armazenar findings
          FINDINGS="[]"
          
          # 1. Verificar se há geração de preços pela IA
          if echo "$DIFF" | grep -iE "ai.*price|gerar.*pre[ç|c]o|price.*generation|retornar.*valor|return.*price"; then
            FINDINGS=$(echo "$FINDINGS" | jq '. += [{"severity": "CRÍTICO", "rule": "IA não deve gerar preços", "file": "detectado em diff", "action": "REJEITAR"}]')
          fi
          
          # 2. Verificar webhook em arquivo de services/ia
          if echo "$FILES" | grep -q "services"; then
            if echo "$DIFF" | grep -E "def.*webhook|async def.*webhook" | grep -v "BackgroundTasks"; then
              FINDINGS=$(echo "$FINDINGS" | jq '. += [{"severity": "CRÍTICO", "rule": "Webhook deve processar IA em BackgroundTasks (< 5s)", "file": "backend/app/api/webhooks", "action": "CORRIGIR"}]')
            fi
          fi
          
          # 3. Verificar credenciais hardcoded
          if echo "$DIFF" | grep -iE "WHATSAPP_TOKEN|OPENAI_API_KEY|DATABASE_URL|JWT_SECRET" | grep -v "\.env"; then
            FINDINGS=$(echo "$FINDINGS" | jq '. += [{"severity": "CRÍTICO", "rule": "Credenciais nunca devem estar no código", "file": "detectado em diff", "action": "REMOVER"}]')
          fi
          
          # 4. Verificar soft delete em leads
          if echo "$FILES" | grep -q "lead"; then
            if echo "$DIFF" | grep -iE "DELETE FROM.*lead|drop.*lead|\.delete\(\)" | grep -v "soft\|is_deleted"; then
              FINDINGS=$(echo "$FINDINGS" | jq '. += [{"severity": "CRÍTICO", "rule": "Leads devem usar soft delete (is_deleted)", "file": "backend/app/models/lead.py", "action": "USAR SOFT DELETE"}]')
            fi
          fi
          
          # 5. Verificar ausência de type hints (Python)
          if echo "$FILES" | grep -E "\.py$" | head -5; then
            # Salvar findings para próximo passo
            echo "findings=$FINDINGS" >> $GITHUB_OUTPUT
          fi
          
          echo "validation_complete=true" >> $GITHUB_OUTPUT

      - name: 🤖 Claude Code Review — Auditor SDD + Conformidade
        id: claude-review
        uses: anthropics/claude-code-github-actions@v1
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            # 🔍 AUDITOR CADIFE SMART TRAVEL
            
            Você é o auditor especializado do projeto Cadife Smart Travel. Sua tarefa é revisar este PR contra a **Spec v1.0** e **claude.md** do projeto, agindo como um auditor de conformidade técnica e de negócio.
            
            ## CONTEXTO DO PROJETO
            - **Projeto:** Cadife Smart Travel (Plataforma de Atendimento Turístico via WhatsApp + Flutter)
            - **MVP:** 25 dias, foco em pré-atendimento automatizado (IA NÃO fecha vendas)
            - **Camadas:** Backend FastAPI + IA LangChain/RAG + Flutter App + WhatsApp Webhook
            - **PO:** Diego Gil | **Scrum Master:** Nikolas Tesch
            
            ## CHECKLIST OBRIGATÓRIO DE AUDITORIA
            
            ### 🔴 RESTRIÇÕES CRÍTICAS (Bloqueia PR se violado)
            - [ ] **IA não gera preços**: Verificar se há prompts/código que geram valores monetários ou confirmam disponibilidade
            - [ ] **Webhook responde em < 5s**: Processamento IA DEVE ser em BackgroundTasks (assíncrono)
            - [ ] **Sem credenciais hardcoded**: Todas as secrets via `.env`, nunca no código
            - [ ] **JWT obrigatório**: Exceto GET/POST /webhook/whatsapp e GET /health
            - [ ] **Soft delete em leads**: DELETE endpoint deve usar `is_deleted = True`, não remover registro
            - [ ] **HTTPS obrigatório**: ngrok para dev, HTTPS em prod
            - [ ] **Type hints (Python)**: Todas as funções públicas devem ter type hints
            - [ ] **Async/await (Backend)**: Todos os route handlers e I/O devem ser `async def`
            - [ ] **Testes obrigatórios**: Toda nova feature deve ter pytest (backend) ou Flutter Test (frontend)
            
            ### 📋 VALIDAÇÃO SDD (Spec-Driven Development)
            - [ ] Existe um JSON de spec correspondente em `specs/active/`?
            - [ ] Status da spec foi atualizado para `"in-progress"`?
            - [ ] Todos os steps completados têm `"status": "done"`?
            - [ ] PR contém apenas código para a task em `specs/active/`?
            - [ ] (Se finalizado) Spec será movida para `specs/done/`?
            
            ### 🏗️ VALIDAÇÃO POR CAMADA
            
            #### Backend (FastAPI) — Responsável: Nikolas Tesch
            - [ ] Pydantic v2 para schemas de entrada/saída
            - [ ] HTTPException para erros, logger estruturado para eventos
            - [ ] `pytest` + `httpx.AsyncClient` para endpoints críticos
            - [ ] Docstrings em funções públicas
            - [ ] Validação de input antes de processar
            
            #### IA / RAG (LangChain) — Responsável: Frank Willian
            - [ ] Prompts contêm restrição: "NÃO gere preços, NÃO confirme disponibilidade"
            - [ ] Extração de briefing testa todos os campos: destino, datas, pessoas, orçamento, perfil
            - [ ] Score de qualificação >= 60% para mudar status
            - [ ] Logs de todas as respostas para auditoria
            
            #### Flutter Agência (CRM) — Responsável: Jakeline
            - [ ] Riverpod com AsyncNotifierProvider para dados remotos
            - [ ] Cores/fonts via AppTheme, nunca hardcoded
            - [ ] GoRouter com guards de auth
            - [ ] Feedback visual: loading, success, error states
            
            #### Flutter Cliente — Responsável: Otávio Grotto
            - [ ] Mesmo padrão Riverpod + GoRouter
            - [ ] Estados de "Aguardando Curadoria", "Proposta Recebida", "Fechado"
            
            #### DevOps / Firebase — Responsável: Luiz Angelo
            - [ ] Docker Compose atualizado se houver mudanças na stack
            - [ ] FCM notificação testada (< 2 segundos de latência)
            
            ### ✅ REGRAS DE NEGÓCIO (Spec v1.0)
            - [ ] Lead segue ciclo: NOVO → EM_ATENDIMENTO → QUALIFICADO → AGENDADO → PROPOSTA → FECHADO
            - [ ] Briefing score >= 60% para transição EM_ATENDIMENTO → QUALIFICADO
            - [ ] Leads sem resposta há 30 dias marcados como PERDIDO
            - [ ] Consultor humano SEMPRE fecha a venda (IA é pré-atendimento apenas)
            
            ### 🎨 IDENTIDADE VISUAL (Obrigatório no Flutter)
            - [ ] Cores: primaryColor #dd0b0e, backgroundColor #393532, scaffoldColor #FFFFFF
            - [ ] Fonts: Inter ou Roboto
            - [ ] Componentes alignados ao design em `docs/design/flutter_design.md`
            
            ### 📚 DOCUMENTAÇÃO
            - [ ] API está documentada no Swagger (`/docs`)?
            - [ ] README atualizado se houver novas dependências?
            - [ ] Decisões arquiteturais registradas em `docs/adr/`?
            - [ ] Bugs corrigidos têm entrada em `docs/bugs/`?
            
            ## FORMATO DE RESPOSTA
            
            Estruture seu comentário assim:
            
            ```
            # 🔍 Auditoria Cadife Smart Travel — PR #XXX
            
            ## ✅ PASSADO
            - Item 1 validado
            - Item 2 validado
            
            ## ⚠️ ATENÇÃO (Não bloqueia, mas recomenda ajustes)
            - [ ] Item 1: Descrição do problema
              - Recomendação: Como corrigir
              - Arquivo: caminho/arquivo.py
            
            ## 🔴 BLOQUEANTE (Deve corrigir antes de merge)
            - [ ] Item 1: REGRA CRÍTICA VIOLADA
              - Motivo: Por que é crítico
              - Ação: O que fazer
              - Arquivo: caminho/arquivo.py
            
            ## 📊 RESUMO
            - Status: [✅ APROVADO | ⚠️ COM RESSALVAS | 🔴 REJEITADO]
            - Commits válidos para merge: SIM / NÃO
            - Próximos passos: ...
            
            ## Changelog de Revisão
            - [timestamp] Revisão inicial realizada
            ```
            
            ## REGRAS DE DECISÃO
            
            1. **Se houver restrição crítica violada:** Status = 🔴 REJEITADO
            2. **Se todos os checks passarem:** Status = ✅ APROVADO
            3. **Se houver apenas recomendações:** Status = ⚠️ COM RESSALVAS (aprova, mas marca itens)
            4. **Sempre cite o responsável técnico da camada** se houver feedback
            5. **Seja específico:** sempre cite arquivo, linha e código problema
            
            Agora proceda com a auditoria deste PR.

      - name: Postar comentário no PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.claude-review.outputs.review }}`;
            
            if (review) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: review
              });
            }

      - name: 📊 Sumário de Auditoria
        run: |
          echo "## 📋 Auditoria Concluída"
          echo ""
          echo "### Arquivos analisados:"
          echo "${{ steps.diff.outputs.files }}" | sed 's/^/- /'
          echo ""
          echo "### Status da Validação Preliminar:"
          echo "Regras críticas checadas ✓"
