name: cadife_smart_travel
description: "Cadife Smart Travel — CRM turístico inteligente com atendimento via IA."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  animations: ^2.1.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.2
  firebase_messaging: ^15.1.4
  flutter_local_notifications: ^18.0.1

  # Storage
  shared_preferences: ^2.3.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
