name: cadife_smart_travel
description: "Cadife Smart Travel — App de atendimento turístico inteligente"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI / Design
  cupertino_icons: ^1.0.8
  animations: ^2.1.2
  shimmer: ^3.0.0
  mask_text_input_formatter: ^2.5.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0

  # Security / Biometrics
  local_auth: ^2.3.0

  # State Management
  flutter_riverpod: ^2.6.1
  flutter_bloc: ^8.1.6
  freezed_annotation: ^2.4.4

  # Functional Error Handling
  fpdart: ^1.1.0

  # Navigation
  go_router: ^17.2.2

  # DI (get_it com registro manual — sem code gen)
  get_it: ^9.2.1

  # HTTP / Network
  dio: ^5.7.0
  connectivity_plus: ^7.1.1

  # Offline-First DB (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Security
  crypto: ^3.0.5
  flutter_secure_storage: ^10.0.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # URL / Deep-linking
  url_launcher: ^6.3.0

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.4.0
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  uuid: ^3.0.7
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  sqflite: ^2.4.2+1
  path: ^1.9.1
  fluttertoast: ^9.0.0
  google_fonts: ^6.1.0
  lucide_icons_flutter: ^3.1.13
  shadcn_ui: 0.54.0
  share_plus: ^12.0.2
  photo_view: ^0.15.0
  pdfrx: ^2.2.24
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint / Analysis / Metrics
  flutter_lints: ^6.0.0
  dart_code_metrics: ^5.7.6

  # Testing
  mocktail: ^1.0.4
  network_image_mock: ^2.1.1
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  freezed: ^2.5.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/splash.json

dependency_overrides:
  google_fonts: ^6.1.0
  http: ^1.1.0
