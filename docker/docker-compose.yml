services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      # Sobrescreve os hostnames do .env para resolução correta dentro da rede Docker
      DATABASE_URL: postgresql+asyncpg://cadife:cadife@db:5432/cadife_db
      PGVECTOR_CONNECTION_STRING: postgresql+psycopg://cadife:cadife@db:5432/cadife_db
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://localstack:4566
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    volumes:
      - ../backend:/app
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cadife
      POSTGRES_PASSWORD: cadife
      POSTGRES_DB: cadife_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadife -d cadife_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis_staging:
    image: redis:7-alpine
    command: redis-server --requirepass staging_redis_pass_change_me
    ports:
      - "6380:6379"
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "staging_redis_pass_change_me", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      - DEBUG=1
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal --version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  redis_staging_data:
  localstack_data:
