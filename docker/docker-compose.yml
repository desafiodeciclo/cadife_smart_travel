services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://cadife:cadife@db:5432/cadife_db
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Volume para persistência da base de conhecimento (RAG) se usada localmente
      - cadife_knowledge_base:/app/knowledge_base
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cadife
      POSTGRES_PASSWORD: cadife
      POSTGRES_DB: cadife_db
    ports:
      - "5433:5432"
    volumes:
      - cadife_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadife -d cadife_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - cadife_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis_staging:
    image: redis:7-alpine
    command: redis-server --requirepass staging_redis_pass_change_me
    ports:
      - "6380:6379"
    volumes:
      - cadife_redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "staging_redis_pass_change_me", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - cadife_chroma_data:/chroma/chroma
    restart: unless-stopped

# Centralização de Volumes Gerenciados pelo Docker
volumes:
  cadife_postgres_data:
    name: cadife_postgres_data
  cadife_redis_data:
    name: cadife_redis_data
  cadife_redis_staging_data:
    name: cadife_redis_staging_data
  cadife_chroma_data:
    name: cadife_chroma_data
  cadife_knowledge_base:
    name: cadife_knowledge_base
