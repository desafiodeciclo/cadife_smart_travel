apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadife-backend
  labels:
    app: cadife-backend
spec:
  replicas: 2 # Alta disponibilidade: no mínimo 2 réplicas rodando
  selector:
    matchLabels:
      app: cadife-backend
  strategy:
    type: RollingUpdate # Atualização sem downtime
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cadife-backend
      annotations:
        # Habilita a coleta de métricas automática pelo Prometheus
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      # Hardening: Execução Rootless (conforme configurado no Dockerfile Distroless)
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: backend
          # A imagem será substituída no momento do deploy pelo CI/CD
          image: cadife-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: cadife-backend-config
            - secretRef:
                name: cadife-backend-secret
          resources:
            # Controle de custo e estabilidade do Node K8S
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          # Liveness Probe: O K8S reinicia o container se isso falhar (Ex: Deadlock)
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness Probe: O K8S tira o container do balanceador se isso falhar (Ex: Banco fora do ar)
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
